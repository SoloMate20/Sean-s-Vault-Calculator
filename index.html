
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Vault NewsCast Studio - Calculator</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme:{extend:{colors:{
        'brand-bg-dark':'#112322',
        'brand-card-bg':'#68ACA8',
        'brand-yellow' :'#f0c555',
        'brand-text'   :'#ffffff',
        'brand-muted'  :'#68ACA8'
    }}}}
  </script>

  <!-- React UMD + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- field styling -->
  <style>
    .input-label{font-weight:700;color:#f0c555;margin-bottom:.4rem;display:block}
    .input-field{
      background:#68ACA8;border:2px solid #112322;border-radius:.75rem;
      padding:.75rem 1rem;font-weight:700;font-size:1rem;color:#112322;width:100%
    }
    select.input-field{
      appearance:none;
      background-image:url("data:image/svg+xml;utf8,<svg fill='%23112322' height='20' viewBox='0 0 24 24' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5H7z'/></svg>");
      background-repeat:no-repeat;background-position:right .9rem center;padding-right:2.2rem
    }
    .badge {
      display: inline-block;
      padding: 0.25rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: bold;
      text-transform: uppercase;
      background: rgba(240, 197, 85, 0.1);
      border: 1px solid rgba(240, 197, 85, 0.3);
      color: #f0c555;
    }
    canvas {
      max-height: 350px;
    }
  </style>
<link rel="stylesheet" href="/index.css">
</head>

<body class="bg-brand-bg-dark text-brand-text min-h-screen flex flex-col p-6">

  <div id="app" class="max-w-3xl mx-auto flex-grow"></div>

  <footer class="max-w-3xl mx-auto mt-10 text-center text-xs text-white/50 leading-snug">
    Disclaimer: This tool uses a daily accrual model with monthly compounding (30-day cycle).<br>
    A 25% performance fee is deducted from gross monthly earnings before compounding.
  </footer>

  <script type="text/babel">
  const {useState, useEffect, useRef}=React;
  const USD=v=>v.toLocaleString('en-US',{style:'currency',currency:'USD'});
  const GBP=v=>v.toLocaleString('en-GB',{style:'currency',currency:'GBP'});
  const EUR=v=>v.toLocaleString('de-DE',{style:'currency',currency:'EUR'});
  const fetchJSON=u=>fetch(u).then(r=>{if(!r.ok)throw Error(r.statusText);return r.json()});

  function GrowthChart({ data, currencySymbol }) {
    const canvasRef = useRef(null);
    const chartRef = useRef(null);

    useEffect(() => {
      if (!canvasRef.current || !data) return;

      const ctx = canvasRef.current.getContext('2d');
      
      if (chartRef.current) {
        chartRef.current.destroy();
      }

      const labels = data.map(d => `M${d.m}`);
      const balanceData = data.map(d => d.end);
      const netAddedData = data.map(d => d.netAdded);

      chartRef.current = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Net Monthly Earnings',
              data: netAddedData,
              backgroundColor: 'rgba(17, 35, 34, 0.4)',
              borderColor: '#112322',
              borderWidth: 1,
              borderRadius: 4,
              yAxisID: 'y1',
              order: 2
            },
            {
              label: 'Principal Growth',
              data: balanceData,
              type: 'line',
              borderColor: '#ffffff',
              backgroundColor: 'rgba(255, 255, 255, 0.1)',
              borderWidth: 3,
              pointRadius: 4,
              pointBackgroundColor: '#ffffff',
              fill: true,
              tension: 0.4,
              yAxisID: 'y',
              order: 1
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            mode: 'index',
            intersect: false,
          },
          plugins: {
            legend: {
              display: true,
              position: 'top',
              labels: { color: '#112322', font: { weight: 'bold' } }
            },
            tooltip: {
              backgroundColor: '#112322',
              titleColor: '#f0c555',
              bodyColor: '#fff',
              borderColor: '#f0c555',
              borderWidth: 1
            }
          },
          scales: {
            y: {
              type: 'linear',
              display: true,
              position: 'left',
              grid: { color: 'rgba(17, 35, 34, 0.1)' },
              ticks: { color: '#112322' },
              title: { display: true, text: 'Total Balance', color: '#112322' }
            },
            y1: {
              type: 'linear',
              display: true,
              position: 'right',
              grid: { drawOnChartArea: false },
              ticks: { color: '#112322' },
              title: { display: true, text: 'Monthly Net', color: '#112322' }
            },
            x: {
              grid: { display: false },
              ticks: { color: '#112322' }
            }
          }
        }
      });

      return () => {
        if (chartRef.current) chartRef.current.destroy();
      };
    }, [data, currencySymbol]);

    return (
      <div className="w-full bg-white/10 p-4 rounded-xl border border-white/10 mt-4">
        <canvas ref={canvasRef}></canvas>
      </div>
    );
  }

  function App(){
    /* inputs */
    const [cryptoId, setCryptoId] = useState('solana');
    const [init,setInit]=useState(1000);
    const [daily,setDaily]=useState(0.01);
    const [months,setMonths]=useState(12);
    const [ccy,setCcy]=useState('USD');

    /* market */
    const [allPrices, setAllPrices] = useState({ solana: null, ethereum: null });
    const [cryptoPrice, setCryptoPrice] = useState(null);
    const [gbp,setGbp] = useState(null);
    const [eur,setEur] = useState(null);

    const [res,setRes] = useState(null);
    
    // Asset symbol mapping
    const symbolMap = { solana: 'SOL', ethereum: 'ETH' };
    const cryptoSymbol = symbolMap[cryptoId] || '';

    // Quantity / Fiat logic
    const calcQty = () => {
      const p = parseFloat(init);
      if (isNaN(p)) return 0;
      if (ccy === cryptoSymbol) return p;
      let usdVal = p;
      if (ccy === 'GBP' && gbp) usdVal = p / gbp;
      if (ccy === 'EUR' && eur) usdVal = p / eur;
      return (usdVal / (cryptoPrice || 1));
    };

    const handleQtyChange = (val) => {
      const q = parseFloat(val);
      if (isNaN(q)) {
        setInit("");
        return;
      }
      if (ccy === cryptoSymbol) {
        setInit(q);
        return;
      }
      let usdVal = q * (cryptoPrice || 0);
      let targetVal = usdVal;
      if (ccy === 'GBP' && gbp) targetVal = usdVal * gbp;
      if (ccy === 'EUR' && eur) targetVal = usdVal * eur;
      setInit(targetVal.toFixed(2));
    };

    const handleFiatValueChange = (val) => {
      const v = parseFloat(val);
      if (isNaN(v)) {
        setInit("");
        return;
      }
      if (ccy !== cryptoSymbol) {
        setInit(v);
        return;
      }
      // If we are in Crypto mode, editing USD Value should update Qty (init)
      if (cryptoPrice) {
        setInit((v / cryptoPrice).toFixed(4));
      }
    };

    /* fetch prices for both SOL and ETH */
    useEffect(()=>{
      Promise.all([
        fetchJSON(`https://api.coingecko.com/api/v3/simple/price?ids=solana,ethereum&vs_currencies=usd`),
        fetchJSON('https://api.exchangerate-api.com/v4/latest/USD')
      ])
      .then(([sp,fx])=>{
        const prices = {
          solana: sp.solana?.usd || null,
          ethereum: sp.ethereum?.usd || null
        };
        setAllPrices(prices);
        setCryptoPrice(prices[cryptoId]);
        setGbp(fx.rates.GBP);
        setEur(fx.rates.EUR);
      })
      .catch((err)=>{
        console.error("Price fetch error:", err);
      });
    }, []);

    // Sync cryptoPrice when cryptoId changes
    useEffect(() => {
      if (allPrices[cryptoId]) {
        setCryptoPrice(allPrices[cryptoId]);
      }
    }, [cryptoId, allPrices]);

    /* Updated calculation logic: Daily Accrual / Monthly Compounding */
    useEffect(()=>{
      if(!cryptoPrice||!gbp||!eur) {
        setRes(null);
        return;
      };

      const principal = parseFloat(init);
      const dailyYield = parseFloat(daily);
      const durationMonths = parseInt(months, 10);
      const feeRate = 0.25; // Fixed 25% performance fee

      if (isNaN(principal) || isNaN(dailyYield) || isNaN(durationMonths) || durationMonths <= 0 || principal <= 0) {
        setRes(null);
        return;
      }

      let currentBalance = principal;
      const monthlyBreakdown = [];
      const daysInCycle = 30; // 30-day period as per instructions

      for (let m = 1; m <= durationMonths; m++) {
        const startOfMonthBalance = currentBalance;
        
        // 1. Daily Accrual (Simple interest applied to the month's starting principal)
        const dailyEarning = startOfMonthBalance * dailyYield;
        const grossMonthlyEarnings = dailyEarning * daysInCycle;

        // 2. Monthly Compounding & Fee Deduction
        const performanceFee = grossMonthlyEarnings * feeRate;
        const netAddedToPrincipal = grossMonthlyEarnings - performanceFee;
        
        // 3. Reset daily counter & Update Principal for next month
        currentBalance = startOfMonthBalance + netAddedToPrincipal;
        
        monthlyBreakdown.push({
          m: m,
          start: startOfMonthBalance,
          grossEarnings: grossMonthlyEarnings,
          fee: performanceFee,
          netAdded: netAddedToPrincipal,
          end: currentBalance,
        });
      }

      const totalGross = monthlyBreakdown.reduce((sum, row) => sum + row.grossEarnings, 0);
      const totalFees = monthlyBreakdown.reduce((sum, row) => sum + row.fee, 0);
      
      setRes({
        final: currentBalance,
        totalGross: totalGross,
        totalFees: totalFees,
        rows: monthlyBreakdown,
      });

    },[init, daily, months, cryptoPrice, gbp, eur]);

    const fmt = v => {
      if (ccy === 'GBP') return GBP(v);
      if (ccy === 'EUR') return EUR(v);
      if (ccy === cryptoSymbol) return v.toLocaleString('en-US', { minimumFractionDigits: 4, maximumFractionDigits: 4 }) + ' ' + cryptoSymbol;
      return USD(v); // Default is USD
    };

    const renderCell = (value) => {
      if (ccy !== cryptoSymbol || !cryptoPrice) {
        return fmt(value);
      }
      return (
        <React.Fragment>
          <div>{fmt(value)}</div>
          <div className="text-[10px] opacity-70 italic">{USD(value * cryptoPrice)}</div>
        </React.Fragment>
      );
    };

    return (
      <div className="space-y-10">
        {/* live price banner */}
        <div className="text-center mb-0">
          <div className="inline-block bg-brand-card-bg border-2 border-brand-bg-dark/30 rounded-full px-6 py-2 text-brand-bg-dark text-sm sm:text-base font-bold shadow-md">
            <span className="inline-block px-2">SOL: <span className="text-white">{allPrices.solana ? USD(allPrices.solana) : '---'}</span></span>
            <span className="mx-2 opacity-30">|</span>
            <span className="inline-block px-2">ETH: <span className="text-white">{allPrices.ethereum ? USD(allPrices.ethereum) : '---'}</span></span>
          </div>
        </div>

        <div className="text-center">
          <h1 className="text-4xl sm:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-brand-yellow to-yellow-300 tracking-wide">Vault Accrual Estimator</h1>
          <p className="text-white/70 text-lg -mt-1">Performance-Adjusted Daily Accrual Logic</p>
          
          <div className="mt-6 max-w-xl mx-auto bg-brand-card-bg border-2 border-brand-bg-dark/20 rounded-xl p-4 text-[11px] sm:text-xs text-brand-bg-dark/80 font-normal leading-relaxed shadow-lg">
            <span className="font-semibold block mb-1 underline uppercase">No Guarantee of Returns</span>
            Financial projections are derived from current Solana/Ethereum spot prices; asset volatility may impact total returns. This tool simulates potential fee earnings based on Dynamic Yield monthly compounding protocols. Please note that average daily yields are non-static. This simulation is provided for informational purposes only and should not be construed as a financial guarantee. Past performance is not indicative of future results.
          </div>
        </div>

        <section className="bg-brand-card-bg rounded-2xl p-8 grid gap-x-8 gap-y-6 sm:grid-cols-2 shadow-2xl border-2 border-brand-bg-dark/10">
          <div>
            <label className="input-label">Asset Type</label>
            <select className="input-field" value={cryptoId} onChange={e=>{
              setCryptoId(e.target.value);
              if (ccy !== 'USD' && ccy !== 'GBP' && ccy !== 'EUR') {
                setCcy(e.target.value.toUpperCase());
              }
            }}>
              <option value="solana">Solana (SOL)</option>
              <option value="ethereum">Ethereum (ETH)</option>
            </select>
          </div>
          <div>
            <label className="input-label">Initial Principal ({ccy})</label>
            <input type="number" className="input-field" value={init} onChange={e=>setInit(e.target.value)}/>
          </div>
          <div>
            <label className="input-label">
              {ccy === cryptoSymbol ? 'Equivalent Value (USD)' : `Quantity (${cryptoSymbol})`}
            </label>
            <input 
              type="number" 
              className="input-field" 
              value={ccy === cryptoSymbol 
                ? (parseFloat(init) * (cryptoPrice || 0)).toFixed(2) 
                : calcQty().toFixed(4)
              } 
              onChange={e => {
                if (ccy === cryptoSymbol) handleFiatValueChange(e.target.value);
                else handleQtyChange(e.target.value);
              }}
            />
          </div>
          <div>
            <label className="input-label">Display Currency</label>
            <select className="input-field" value={ccy} onChange={e=>setCcy(e.target.value)}>
              <option>USD</option><option>GBP</option><option>EUR</option><option>{cryptoSymbol}</option>
            </select>
          </div>
          <div>
            <label className="input-label">Average Daily Yield (%)</label>
            <select className="input-field" value={daily} onChange={e=>setDaily(Number(e.target.value))}>
              <option value={0.0025}>0.25 % Daily</option>
              <option value={0.005}>0.5 % Daily</option>
              <option value={0.0075}>0.75 % Daily</option>
              <option value={0.01}>1.0 % Daily</option>
              <option value={0.0125}>1.25 % Daily</option>
            </select>
          </div>
          <div>
            <label className="input-label">Duration (months)</label>
            <input type="number" className="input-field" value={months} onChange={e=>setMonths(e.target.value)}/>
          </div>
        </section>

        {res && cryptoPrice && (
          <section className="bg-brand-card-bg rounded-2xl p-8 space-y-6 text-brand-bg-dark shadow-2xl border-t-4 border-brand-yellow relative overflow-hidden">
            <div className="absolute top-4 right-4 flex flex-col items-end gap-2">
               <span className="badge !bg-brand-bg-dark/10 !border-brand-bg-dark/20 !text-brand-bg-dark">Monthly Compounding</span>
               <span className="badge !bg-brand-bg-dark/10 !border-brand-bg-dark/20 !text-brand-bg-dark">25% Fee Applied</span>
            </div>
            
            <h2 className="text-2xl font-black uppercase tracking-tight">Projected Summary</h2>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div className="bg-brand-bg-dark/10 p-4 rounded-xl border border-brand-bg-dark/10">
                <p className="text-[10px] font-bold uppercase opacity-60 mb-1">Final Balance</p>
                <p className="text-2xl font-black">{fmt(res.final)}</p>
              </div>
              <div className="bg-brand-bg-dark/10 p-4 rounded-xl border border-brand-bg-dark/10">
                <p className="text-[10px] font-bold uppercase opacity-60 mb-1">Gross Yield</p>
                <p className="text-xl font-bold">{fmt(res.totalGross)}</p>
              </div>
              <div className="bg-brand-bg-dark/10 p-4 rounded-xl border border-brand-bg-dark/10">
                <p className="text-[10px] font-bold uppercase opacity-60 mb-1">Total Fees</p>
                <p className="text-xl font-bold text-red-900/60">{fmt(res.totalFees)}</p>
              </div>
            </div>

            <GrowthChart data={res.rows} currencySymbol={ccy} />

            <details className="mt-8 group">
              <summary className="underline cursor-pointer font-bold hover:text-white transition-colors list-none flex items-center gap-2">
                <span className="group-open:rotate-90 transition-transform">▶</span> Monthly Accrual Breakdown
              </summary>
              <div className="overflow-x-auto">
                <table className="w-full text-sm mt-4 text-left border-collapse">
                  <thead>
                    <tr className="border-b-2 border-brand-bg-dark/20 text-brand-bg-dark/60 text-[10px] uppercase font-black tracking-widest">
                      <th className="py-3 px-2">Month</th>
                      <th className="py-3 px-2">Principal</th>
                      <th className="py-3 px-2">Gross Earned</th>
                      <th className="py-3 px-2">Fee (25%)</th>
                      <th className="py-3 px-2">Net Added</th>
                      <th className="py-3 px-2 text-right">End Principal</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-brand-bg-dark/10">
                    {res.rows.map(r=>(
                      <tr key={r.m} className="hover:bg-brand-bg-dark/5 transition-colors">
                        <td className="py-3 px-2 font-black">#{r.m}</td>
                        <td className="py-3 px-2">{renderCell(r.start)}</td>
                        <td className="py-3 px-2 font-bold">{renderCell(r.grossEarnings)}</td>
                        <td className="py-3 px-2 text-red-900/40">{renderCell(r.fee)}</td>
                        <td className="py-3 px-2 font-black underline decoration-brand-bg-dark/20">{renderCell(r.netAdded)}</td>
                        <td className="py-3 px-2 font-black text-right">{renderCell(r.end)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </details>
          </section>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
  </script>
</body>
</html>
